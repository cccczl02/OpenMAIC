<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenMAIC</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    #splash {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { margin-top: 16px; font-size: 14px; opacity: 0.7; }
  </style>
</head>
<body>
  <div id="splash">
    <div>
      <div class="loader"></div>
      <p>Connecting to OpenMAIC...</p>
    </div>
  </div>
  <script>
    const __TAURI__ = window.__TAURI__;
    const DEFAULT_URL = 'https://open.maic.chat';

    async function loadApp() {
      let url = DEFAULT_URL;
      if (__TAURI__ && __TAURI__.core && __TAURI__.core.invoke) {
        try {
          url = await __TAURI__.core.invoke('get_server_url');
        } catch (e) {
          console.warn('Failed to get server URL from Tauri, using default:', e);
        }
      }
      window.location.replace(url);
    }

    loadApp();
  </script>
</body>
</html>
